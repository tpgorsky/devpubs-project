<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DevPubs{% endblock %}</title>

    <!-- Подключение Bootstrap 5 CSS (Исправлено) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Подключение Bootstrap Icons (Исправлено) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Подключение шрифта Inter из Google Fonts (Исправлено) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        main {
            flex: 1;
        }
        /* Стилизация для плавного перехода ссылок */
        a {
            transition: color 0.2s ease-in-out;
        }
    </style>
</head>
<body>

    <!-- Вставка навигационной панели -->
    {% include 'navbar.html' %}

    <!-- Контейнер для основного содержимого страниц -->
    <main class="container my-5">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Вставка футера (подвала сайта) -->
    {% include 'footer.html' %}

    <!-- Подключение Bootstrap 5 JS Bundle (Исправлено) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
